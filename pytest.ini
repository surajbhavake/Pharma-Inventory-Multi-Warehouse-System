[tool:pytest]
DJANGO_SETTINGS_MODULE = pharma_core.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts = 
    --verbose
    --strict-markers
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --cov-config=.coveragerc
testpaths = users inventory recalls
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests